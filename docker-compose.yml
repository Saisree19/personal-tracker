version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-tracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracker}
      POSTGRES_DB: personal_tracker_auth
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/db/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tracker} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      R2DBC_URL: ${AUTH_R2DBC_URL:-r2dbc:postgresql://db:5432/personal_tracker_auth}
      R2DBC_USERNAME: ${DB_USERNAME:-tracker}
      R2DBC_PASSWORD: ${DB_PASSWORD:-tracker}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      RESET_FRONTEND_URL: ${RESET_FRONTEND_URL:-http://localhost:80/reset}
      MAIL_SINK_ENABLED: ${MAIL_SINK_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"

  task-service:
    build:
      context: ./backend
      dockerfile: task-service/Dockerfile
    environment:
      R2DBC_URL: ${TASK_R2DBC_URL:-r2dbc:postgresql://db:5432/personal_tracker_task}
      R2DBC_USERNAME: ${DB_USERNAME:-tracker}
      R2DBC_PASSWORD: ${DB_PASSWORD:-tracker}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8082"

  reporting-service:
    build:
      context: ./backend
      dockerfile: reporting-service/Dockerfile
    environment:
      R2DBC_URL: ${REPORTING_R2DBC_URL:-r2dbc:postgresql://db:5432/personal_tracker_task}
      R2DBC_USERNAME: ${DB_USERNAME:-tracker}
      R2DBC_PASSWORD: ${DB_PASSWORD:-tracker}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8083:8083"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_AUTH_URL: ${VITE_AUTH_URL:-http://localhost:8081}
        VITE_TASK_URL: ${VITE_TASK_URL:-http://localhost:8082}
        VITE_REPORT_URL: ${VITE_REPORT_URL:-http://localhost:8083}
    depends_on:
      - auth-service
      - task-service
      - reporting-service
    ports:
      - "80:80"

volumes:
  db-data:
